name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Format check (black)
        run: black --check src/ tests/

      - name: Type check (mypy)
        run: mypy src/cms_fwa/ --ignore-missing-imports

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --junitxml=test-results.xml

      - name: Verify dbt compiles
        run: |
          cd dbt
          python -c "
          from dbt.cli.main import dbtRunner
          runner = dbtRunner()
          result = runner.invoke(['compile', '--profiles-dir', '.', '--project-dir', '.'])
          assert result.success, 'dbt compile failed'
          print('dbt compile: OK')
          "

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f docker/Dockerfile.api -t cms-fwa-api .

      - name: Build Dashboard image
        run: docker build -f docker/Dockerfile.dashboard -t cms-fwa-dashboard .
